name: Docs

on:
  push:
    branches:
      - main
  release:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notebook-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gfortran libgsl-dev pandoc
      - name: Install package and notebook dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[notebooks,fast]"
      - name: Execute EOS generator notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute Test_Case/test_EOSgenerators.ipynb \
            --output /tmp/test_EOSgenerators.executed.ipynb \
            --ExecutePreprocessor.timeout=900 \
            --ExecutePreprocessor.kernel_name=python3

  build:
    runs-on: ubuntu-latest
    needs: notebook-smoke
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gfortran libgsl-dev pandoc
      - name: Install package and docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs,notebooks,fast]"
      - name: Sphinx build
        run: |
          sphinx-build -W docs/source _build
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        with:
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _build/
          force_orphan: true
